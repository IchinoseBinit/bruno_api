info:
  name: 2. Get job status
  type: http
  seq: 2

http:
  method: GET
  url: "{{gateway}}/api/product/image-enhancer/job/{{job_id}}/"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Poll this every ~2s until status is 'done' or 'failed'. When done, result_image is the URL of the generated image.
