info:
  name: Login
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}{{basePath}}/login"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: "{{basicAuth}}"
    - name: signature
      value: "{{signature}}"
  body:
    type: json
    data: "{\r

      \    \"username\": \"{{username}}\",\r

      \    \"password\": \"{{password}}\"\r

      }"
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        // =====================================================
        // RSA SHA256 Signature Generator (Refactored + Aligned)
        // =====================================================

        /*******************************
         * 1. Fake browser globals
         *******************************/
        var navigator = {};
        var window = {};

        /*******************************
         * 2. Load jsrsasign library
         *******************************/
        var lib = bru.getGlobalEnvVar("jsrsasign-js");
        if (!lib) {
            throw new Error('jsrsasign library not loaded. Run "0. Load jsrsasign Library" first.');
        }
        eval(lib);

        /*******************************
         * 3. Get credentials (collection scope)
         *******************************/
        const username = bru.getCollectionVar("username");
        const password = bru.getCollectionVar("password");

        if (!username || !password) {
            throw new Error("username or password is missing in collection variables.");
        }

        /*******************************
         * 4. Generate Basic Auth
         *******************************/
        const basicAuth = "Basic " + btoa(username + ":" + password);
        bru.setVar("basicAuth", basicAuth);

        console.log("Basic Auth:", basicAuth);

        /*******************************
         * 5. Prepare payload (MUST match request body exactly)
         *******************************/
        // 4. Prepare payload with variable replacement
        let payload = bru.interpolate(request.data);

        console.log("Payload:", payload);

        /*******************************
         * 6. Get private key (collection scope)
         *******************************/
        const privateKeyRaw = bru.getCollectionVar("privateKey");
        if (!privateKeyRaw) {
            throw new Error('privateKey variable is missing. Run "Generate Key Pair" first.');
        }

        /*******************************
         * 7. Helpers
         *******************************/
        function isHex(str) {
            return /^[0-9a-fA-F]+$/.test(str);
        }

        function isBase64(str) {
            const normalized = str.replace(/[\r\n\s]/g, "");
            try {
                return btoa(atob(normalized)) === normalized;
            } catch (e) {
                return false;
            }
        }

        /*******************************
         * 8. Normalize private key to HEX
         *******************************/
        let privateKeyHex;

        if (isHex(privateKeyRaw)) {
            privateKeyHex = privateKeyRaw;
        } else if (isBase64(privateKeyRaw)) {
            privateKeyHex = stohex(atob(privateKeyRaw.replace(/[\r\n\s]/g, "")));
        } else {
            throw new Error("privateKey must be Base64 or hex PKCS8.");
        }

        /*******************************
         * 9. Create key object
         *******************************/
        const privateKeyObj = KEYUTIL.getKeyFromPlainPrivatePKCS8Hex(privateKeyHex);

        /*******************************
         * 10. Sign payload (RSA SHA256)
         *******************************/
        const sig = new KJUR.crypto.Signature({ alg: "SHA256withRSA" });
        sig.init(privateKeyObj);
        sig.updateString(payload);

        const signature = hextob64(sig.sign());

        /*******************************
         * 11. Store signature (expected name)
         *******************************/
        bru.setVar("signature", signature);

        console.log("Signature:", signature);
        console.log("Signature generated successfully!");
    - type: after-response
      code: |-
        var jsonData = res.getBody();
        if (res.getStatus() === 200) {
            var json = res.getBody();
            if (json.accessToken) {
                pm.collectionVariables.set('accessToken', json.accessToken);
                console.log('Access token saved successfully');
            }
        }

        test('Login successful', function () {
            expect(res.getStatus()).to.equal(200);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  **Prerequisites:**
  1. Run '0. Load jsrsasign Library' (once)
  2. Set `username` and `password` variables
  3. Set `privateKey` (or run 'Generate Key Pair')

  **Auto-generated:**
  - `Authorization`: Basic Auth header
  - `signature`: SHA256withRSA signature
